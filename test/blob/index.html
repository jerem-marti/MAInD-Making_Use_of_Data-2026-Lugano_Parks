<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Blob — Phase 1 prototype</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">Blob — Phase 1</div>
  <label class="bg-pick">
    Background
    <input type="color" id="bg-color" value="#FAFAF7" />
  </label>
  <label class="park-pick">
    Park preset
    <select id="park-preset"></select>
  </label>
</header>

<main>
  <section class="hero">
    <div id="hero-stage" class="stage"></div>
    <div class="hero-meta" id="hero-meta"></div>
  </section>

  <section class="strip" id="strip-120" aria-label="5 parks at 120px"></section>
  <section class="strip" id="strip-200" aria-label="5 parks at 200px"></section>
</main>

<aside class="panel" id="panel">
  <h2>Parameters</h2>
  <details open>
    <summary>Category weights</summary>
    <div id="weight-controls"></div>
    <button type="button" id="normalise-btn">Normalise to 1</button>
  </details>

  <details open>
    <summary>Palette</summary>
    <div id="colour-controls"></div>
  </details>

  <details open>
    <summary>Form</summary>
    <label>Size <span class="val" id="size-val"></span>
      <input type="range" id="size" min="50" max="500" step="2" value="400" />
    </label>
    <label>Edge softness <span class="val" id="soft-val"></span>
      <input type="range" id="softness" min="0" max="100" step="1" value="22" />
    </label>
    <label>Internal blending <span class="val" id="blend-val"></span>
      <input type="range" id="blend" min="0" max="100" step="1" value="65" />
    </label>
    <label>Irregularity <span class="val" id="irr-val"></span>
      <input type="range" id="irregularity" min="0" max="100" step="1" value="18" />
    </label>
  </details>

  <details open>
    <summary>Breathing</summary>
    <label>Rate (s/cycle) <span class="val" id="rate-val"></span>
      <input type="range" id="rate" min="0" max="10" step="0.1" value="6" />
    </label>
    <label>Amplitude (%) <span class="val" id="amp-val"></span>
      <input type="range" id="amplitude" min="0" max="15" step="0.1" value="3" />
    </label>
  </details>

  <details>
    <summary>Diagnostics</summary>
    <div id="weights-readout" class="readout"></div>
  </details>
</aside>

<script type="module" src="src/main.js"></script>
</body>
</html>
