<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>04 — View C compare · 2 variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  body { font-family: 'Inter', sans-serif; }

  /* ================================================================ */
  /* Behind-modal: dimmed map ghost                                   */
  /* ================================================================ */
  .vc-stage {
    position: relative;
    background: var(--color-bg);
    overflow: hidden;
  }
  .vc-stage .map-ghost {
    position: absolute;
    inset: 0;
    background: var(--color-bg);
  }
  .vc-stage .map-ghost::before {
    /* indistinct blob shapes, suggest the dimmed map underneath */
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(180px 140px at 22% 38%, rgba(184,164,240,0.32), transparent 70%),
      radial-gradient(160px 130px at 68% 28%, rgba(95,227,168,0.30), transparent 70%),
      radial-gradient(140px 110px at 80% 70%, rgba(107,216,239,0.30), transparent 70%),
      radial-gradient(110px 90px  at 35% 78%, rgba(240,205,61,0.28),  transparent 70%),
      radial-gradient(80px  70px  at 50% 50%, rgba(168,184,200,0.25), transparent 70%);
    filter: blur(16px);
  }
  .vc-stage .map-ghost::after {
    /* the 6% text-primary dim overlay called for in the brief */
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(26, 26, 26, 0.06);
  }

  /* ================================================================ */
  /* Modal                                                            */
  /* ================================================================ */
  .vc-modal {
    position: relative;
    margin: 80px auto;
    background: var(--color-bg);
    border: 0.5px solid var(--color-border-light);
    border-radius: var(--radius-lg);
  }
  .vc-modal.gen { width: 1280px; padding: 64px; }
  .vc-modal.dense { width: 1080px; padding: 48px; }

  .vc-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 44px;
    height: 44px;
    border: 0;
    background: transparent;
    color: var(--color-text-secondary);
    font-family: inherit;
    font-size: 24px;
    line-height: 1;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 200ms ease;
  }
  .vc-close:hover { color: var(--color-text-primary); }

  /* Header block */
  .vc-head { margin-bottom: 64px; }
  .vc-head .label-line { margin-bottom: var(--space-3); }
  .vc-head .subtitle-line {
    max-width: 640px;
    color: var(--color-text-secondary);
  }
  .vc-modal.dense .vc-head { margin-bottom: 48px; }

  /* Five-station row */
  .stations {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--space-7);
    align-items: start;
  }
  .vc-modal.dense .stations { gap: var(--space-5); }

  .station {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Microbar above aura */
  .microbar-block {
    width: 100%;
    margin-bottom: var(--space-4);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .microbar {
    height: 2px;
    background: var(--color-border-medium);
    margin-bottom: var(--space-1);
  }
  .microbar-count {
    text-align: left;
  }

  /* Aura — placeholder mode (per user choice) */
  .vc-aura {
    border-radius: 50%;
    border: 0.5px dashed var(--color-border-medium);
    background: var(--color-surface-secondary);
    position: relative;
    margin-bottom: var(--space-5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vc-modal.gen   .vc-aura { width: 180px; height: 180px; }
  .vc-modal.dense .vc-aura { width: 140px; height: 140px; }

  /* Light radial wash to suggest composition without committing to a
     rendering technique (Phase 1 will resolve). */
  .vc-aura .wash {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    pointer-events: none;
    filter: saturate(0.85);
  }
  .vc-aura .placeholder-tag {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    background: rgba(250, 247, 242, 0.85);
    padding: 2px 6px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* Station meta below aura */
  .station-name { margin: 0 0 var(--space-5); }
  .vc-modal.dense .station-name { margin-bottom: var(--space-4); }

  .station-block { width: 100%; }
  .station-block + .station-block { margin-top: var(--space-4); }
  .station-block .label-line { margin-bottom: var(--space-2); }
  .top-words {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
  }
  .top-words .w {
    color: var(--color-text-primary);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
  }

  /* Discussion strip */
  .vc-prompt {
    margin-top: var(--space-7);
    padding-top: var(--space-7);
    border-top: 0.5px solid var(--color-border-light);
  }
  .vc-prompt .questions {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .vc-prompt.inline .questions {
    flex-direction: row;
    gap: 0;
    flex-wrap: wrap;
    align-items: baseline;
  }
  .vc-prompt.inline .questions .q + .q::before {
    content: '·';
    margin: 0 var(--space-3);
    color: var(--color-text-tertiary);
    opacity: 0.6;
  }
  .vc-prompt .q {
    color: var(--color-text-secondary);
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
// ───────────────────────── data ─────────────────────────
const PARKS = [
  {
    id: 'ciani',
    name: 'Parco Ciani',
    words: 1620,
    width: 100,
    top: ['beautiful', 'walk', 'relax'],
    dominant: { name: 'emotional', hex: '#B8A4F0' },
    composition: { emotional: 46, sensory: 18, action: 20, relational: 5,  infra: 10, tension: 1 },
  },
  {
    id: 'tassino',
    name: 'Parco Tassino',
    words: 856,
    width: 53,
    top: ['beautiful', 'nice', 'picnic'],
    dominant: { name: 'emotional', hex: '#B8A4F0' },
    composition: { emotional: 41, sensory: 21, action: 15, relational: 9,  infra: 12, tension: 3 },
  },
  {
    id: 'san-michele',
    name: 'Parco San Michele',
    words: 550,
    width: 34,
    top: ['beautiful', 'view', 'quiet'],
    dominant: { name: 'emotional', hex: '#B8A4F0' },
    composition: { emotional: 49, sensory: 22, action: 13, relational: 2,  infra: 13, tension: 2 },
  },
  {
    id: 'paradiso',
    name: 'Parco Paradiso',
    words: 369,
    width: 23,
    top: ['beautiful', 'view', 'children'],
    dominant: { name: 'emotional', hex: '#B8A4F0' },
    composition: { emotional: 43, sensory: 22, action: 11, relational: 9,  infra: 13, tension: 1 },
  },
  {
    id: 'lambertenghi',
    name: 'Parco Lambertenghi',
    words: 65,
    width: 4,
    top: ['children', 'sports', 'play'],
    dominant: { name: 'relational', hex: '#F0CD3D' },
    composition: { emotional: 28, sensory: 11, action: 11, relational: 28, infra: 22, tension: 2 },
  },
];

// Build a multi-radial-gradient that softly blends the six lens hues
// in roughly the right proportions. This is mockup-quality only; Phase 1
// will resolve the real rendering technique.
function auraWash(c) {
  // place each hue at a different anchor; size scales with composition share
  const lensColors = {
    emotional:    '#B8A4F0',
    sensory:      '#5FE3A8',
    action:       '#6BD8EF',
    relational:   '#F0CD3D',
    infra:        '#A8B8C8',
    tension:      '#9A8BA8',
  };
  const anchors = {
    emotional:    [30, 35],
    sensory:      [70, 30],
    action:       [78, 65],
    relational:   [22, 70],
    infra:        [50, 80],
    tension:      [50, 50],
  };
  const layers = Object.keys(c).map(k => {
    const [x, y] = anchors[k];
    const radius = 25 + Math.sqrt(c[k]) * 6; // % units
    const alpha = Math.min(0.95, 0.35 + c[k] / 100);
    return `radial-gradient(circle at ${x}% ${y}%, ${lensColors[k]} 0%, ${hexA(lensColors[k], alpha)} 18%, transparent ${radius}%)`;
  });
  return layers.join(', ') + `, var(--color-surface-secondary)`;
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ───────────────────────── components ─────────────────────────
function Station({ park, scale = 'gen' }) {
  return (
    <div className="station">
      <div className="microbar-block">
        <div className="microbar" style={{ width: park.width + '%' }} />
        <div className="t-label-s microbar-count">{park.words.toLocaleString('en-US')} words</div>
      </div>

      <div className="vc-aura" aria-label={`${park.name} aura placeholder`}>
        <div className="wash" style={{ background: auraWash(park.composition) }} />
        <span className="placeholder-tag">aura · placeholder</span>
      </div>

      <h3 className="t-display-m station-name">{park.name}</h3>

      <div className="station-block">
        <div className="t-label label-line">Top words</div>
        <div className="top-words">
          {park.top.map(w => <span key={w} className="w">{w}</span>)}
        </div>
      </div>

      <div className="station-block">
        <div className="t-label label-line">Dominant lens</div>
        <span className="tag-pill">
          <span className="dot" style={{ background: park.dominant.hex }} />
          {park.dominant.name}
        </span>
      </div>
    </div>
  );
}

function Modal({ scale }) {
  const isDense = scale === 'dense';
  return (
    <div className="vc-stage" style={{ width: isDense ? 1180 : 1380, height: isDense ? 1080 : 1280 }}>
      <div className="map-ghost" />
      <div className={`vc-modal ${scale}`}>
        <button className="vc-close" aria-label="Close">×</button>

        <div className="vc-head">
          <div className="t-label label-line">All five auras, side by side</div>
          <p className="t-body subtitle-line" style={{ margin: 0 }}>
            Sized equally on purpose. With volume removed, only the colours speak.
          </p>
        </div>

        <div className="stations">
          {PARKS.map(p => <Station key={p.id} park={p} scale={scale} />)}
        </div>

        <div className={`vc-prompt ${isDense ? 'inline' : ''}`}>
          <div className="questions">
            <span className="t-body q">— Which two parks look most alike?</span>
            <span className="t-body q">— Which one isn't like the others?</span>
            <span className="t-body q">— What's the same across all five?</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ───────────────────── Canvas composition ─────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="view-c-variants"
        title="View C — Compare all five"
        subtitle="Modal overlay above the map. Five parks at equal aura size; volume only hinted via the microbar above each. Two density variants."
      >
        <DCArtboard
          id="generous"
          label="A · Generous · 1280×, 180px auras"
          width={1380}
          height={1280}
          note="Default. Generous spacing between stations and around the prompt strip. Reads cleanly at projector distance."
        >
          <Modal scale="gen" />
        </DCArtboard>
        <DCArtboard
          id="dense"
          label="B · Dense · 1080×, 140px auras"
          width={1180}
          height={1080}
          note="Tighter. Three prompts on a single inline row. Tests fit on a smaller projector resolution; pays for it in breathing room."
        >
          <Modal scale="dense" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
